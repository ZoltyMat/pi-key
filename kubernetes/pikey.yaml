# PiKey k3s deployment
#
# This runs PiKey as a pod in your k3s cluster, useful for:
# - Running PiKey on a node with Bluetooth/USB access
# - Managing PiKey alongside your other cluster workloads
#
# Prerequisites:
# - Node with Bluetooth adapter or USB OTG capability
# - config.yaml in a ConfigMap or Secret
#
# Usage:
#   kubectl create secret generic pikey-config \
#     --from-file=config.yaml=config.yaml -n pikey
#   kubectl apply -f kubernetes/pikey.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: pikey

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pikey
  namespace: pikey
  labels:
    app.kubernetes.io/name: pikey
    app.kubernetes.io/component: hid-spoofer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pikey
      app.kubernetes.io/component: hid-spoofer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pikey
        app.kubernetes.io/component: hid-spoofer
    spec:
      # Schedule on a node with Bluetooth access
      # nodeSelector:
      #   pikey/bluetooth: "true"
      hostNetwork: true    # Required for BlueZ D-Bus
      containers:
        - name: pikey
          image: ghcr.io/zoltymat/pi-key:latest
          args: ["--mode", "both", "--transport", "auto"]
          securityContext:
            privileged: true   # Required for BT/USB gadget
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: dbus
              mountPath: /var/run/dbus
              readOnly: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          secret:
            secretName: pikey-config
        - name: dbus
          hostPath:
            path: /var/run/dbus
            type: Directory
